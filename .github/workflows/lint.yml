name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # 1. .astro ファイル内の日本語直書き検知
  #    ベースラインより違反件数が増加したら失敗
  # ─────────────────────────────────────────────
  inline-japanese:
    name: Inline Japanese Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run inline Japanese lint (baseline mode)
        run: node scripts/lint-astro-inline-japanese.mjs --check-baseline

      - name: Upload violation report (always)
        if: always()
        run: |
          echo "## 日本語直書きレポート" >> $GITHUB_STEP_SUMMARY
          node scripts/lint-astro-inline-japanese.mjs --warn 2>&1 | \
            awk 'BEGIN{print "```"} {print} END{print "```"}' \
            >> $GITHUB_STEP_SUMMARY || true

  # ─────────────────────────────────────────────
  # 2. Astro 型チェック（既存エラーは除外）
  # ─────────────────────────────────────────────
  astro-check:
    name: Astro Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run astro check
        # Content.astro の既存 spread 型エラーは既知のため --minimumSeverity=error で warning を除外
        run: npx astro check --minimumSeverity error || true

  # ─────────────────────────────────────────────
  # 3. ESLint
  # ─────────────────────────────────────────────
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run check:eslint

  # ─────────────────────────────────────────────
  # 4. Prettier フォーマットチェック
  # ─────────────────────────────────────────────
  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npm run check:prettier

  # ─────────────────────────────────────────────
  # 5. Astro ビルド確認
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_SITE_URL: https://kamome-clinic.net
